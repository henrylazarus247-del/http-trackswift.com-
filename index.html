<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackSwift - Package Tracking</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚚 TrackSwift</h1>
            <p>Real-time Package Tracking</p>
        </header>

        <main>
            <section class="search-section">
                <div class="search-box">
                    <input type="text" id="trackingInput" placeholder="Enter tracking number..." />
                    <button id="trackBtn" onclick="searchTracking()">Track Package</button>
                </div>
            </section>

            <section class="tracking-results" id="results" style="display:none;">
                <div class="package-info">
                    <h2>Tracking Number: <span id="trackingNumber"></span></h2>
                    <p>Status: <span id="status" class="status-badge"></span></p>
                </div>

                <div class="timeline">
                    <h3>Delivery Timeline</h3>
                    <div class="timeline-container" id="timelineContainer">
                        <!-- Timeline items will be inserted here -->
                    </div>
                </div>
            </section>

            <section class="sample-tracking">
                <h3>Sample Tracking Numbers</h3>
                <div class="sample-buttons">
                    <button onclick="trackPackage('TRK001')">TRK001</button>
                    <button onclick="trackPackage('TRK002')">TRK002</button>
                    <button onclick="trackPackage('TRK003')">TRK003</button>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 TrackSwift. All rights reserved.</p>
        </footer>
    </div>

    <script src="js/tracking.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
